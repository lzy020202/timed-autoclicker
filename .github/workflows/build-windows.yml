name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --name "TimedAutoClicker" autoclicker.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TimedAutoClicker-Windows
          path: dist/TimedAutoClicker.exe
          if-no-files-found: error
